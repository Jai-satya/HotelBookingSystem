spring:
  application:
    name: HotelBookingSystem
  datasource:
    url: jdbc:postgresql://localhost:5432/hotel_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cache:
    type: simple
  mail:
    host: smtp.example.com
    port: 587
    username: your_email
    password: your_password

resilience4j:
  ratelimiter:
    instances:
      api:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 0

app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    expirationMs: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
